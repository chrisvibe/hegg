logging:
  out_path: /out/test/ca/rule90
  save_keys:
  - parameters
  - w_bi
  - graph
  history:
    record: true
    persist_to_disk: false
    buffer_size: 256
model:
  wiring:
  - type: pattern
    source: B
    target: I
    pattern: identity
  - type: pattern
    source: I
    target: R
    pattern: identity
  - type: gnm
    source: R
    target: R
    k_avg: 2.0
    k_min: 2
    k_max: 2
    self_loops: 0.0
  input_layer:
    seed: 0
    n_nodes: 0                # purely autonomous CA — no input nodes
    ticks: '1'
  output_layer:
    seed: 0
    n_nodes: 1
  reservoir_layer:
    seed: 0
    init: zeros         # clean slate; center node seeded manually in __main__
    n_nodes: 64
    reset: true
  training:
    seed: 0
    batch_size: 1
    epochs: 1
    accuracy_threshold: 0.05
