logging:
  out_path: /tmp/boolean_reservoir/test/boolean_reservoir/sample_model
  save_keys:
  - graph
  - lut
  grid_search:
    n_samples: 1
    run: [train]
  history:
    buffer_size: 64
    record: true
model:
  wiring:
  - type: pattern
    source: B
    target: I
    pattern: identity
  - type: pattern
    source: I
    target: R
    pattern: identity
  - type: gnm
    source: R
    target: R
    k_avg: R_k_avg
    k_min: R_k_min
    k_max: R_k_max
    self_loops: R_self_loops
    mode: R_mode
  input_layer:
    perturbation: override
    encoding: base2
    features: 1
    resolution: 1
    redundancy: 2
    ticks: '1'
  output_layer:
    activation: sigmoid
    n_nodes: 1
    mode: classification
  reservoir_layer:
    init: zeros
    n_nodes: 32
    reset: true
  training:
    epochs: 1
    evaluation: dev
    optim:
      name: ridge
      params:
        alpha: 1.0e-3
  variables:
    R_k_avg: 4.0
    R_k_min: 0
    R_k_max: 25
    R_self_loops: 0
    R_mode: heterogeneous
dataset:
  task: density
  bits: 10
  window: 3
  delay: 3
  split:
    train: 0.5
    dev: 0.5
    test: 0
  samples: 2048
  sampling_mode: exhaustive
  shuffle: true
  seed: 0
