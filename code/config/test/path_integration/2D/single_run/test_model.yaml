model:
  wiring:
  - type: pattern
    source: B
    target: I
    pattern: identity
  - type: pattern
    source: I
    target: R
    pattern: identity
  - type: gnm
    source: R
    target: R
    k_avg: R_k_avg
    k_min: R_k_min
    k_max: R_k_max
    self_loops: R_self_loops
    mode: heterogeneous
  input_layer:
    perturbation: override
    resolution: 8
    encoding: binary_embedding
    interleaving: 0
    features: 2
    redundancy: 6
    chunks: 1
    seed: 0
  output_layer:
    n_nodes: 2
    seed: 0
  reservoir_layer:
    init: random
    n_nodes: 500
    p: 0.5
    seed: 0
  training:
    batch_size: 100
    epochs: 30
    accuracy_threshold: 0.05
    evaluation: test
    seed: 0
    optim:
      name: ridge
      params:
        alpha: 1.0e-3
  variables:
    R_k_avg: 4
    R_k_max: 10
    R_k_min: 0
    R_self_loops: 0
logging:
  out_path: /tmp/boolean_reservoir/test/path_integration/2D/single_run/test_model
dataset:
  dimensions: 2
  steps: 5
  strategy:
    name: LevyFlightStrategy
    params:
      alpha: 1
      max_acceleration: 0.05
  boundary:
    name: PolygonBoundary
    params:
      n_sides: 12
      radius: 1.0
      rotation: pi/4
  split:
    train: 0.5
    dev: 0.3
    test: 0.2
  samples: 10000
  seed: 0
