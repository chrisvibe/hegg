logging:
  out_path: /tmp/boolean_reservoir/test/path_integration/2D/grid_search/linearity/velocity
  save_keys: null
  grid_search:
    n_samples: 1
    run:
    - train
model:
  wiring:
  - type: pattern
    source: B
    target: I
    pattern: identity
  - type: pattern
    source: I
    target: R
    pattern: identity
  - type: gnm
    source: R
    target: R
    k_avg: R_k_avg
    k_min: 0
    k_max: 5
    self_loops: R_self_loops
    mode: R_mode
  input_layer:
    encoding: base2
    features: 2
    redundancy: 1
    resolution: 8
  output_layer:
    n_nodes: 2
    mode: time-series
  reservoir_layer:
    init: zeros
    n_nodes: 100
    reset: true
  training:
    accuracy_threshold: 0.05
    evaluation: dev
    optim:
      name: ridge
      params:
        alpha: 0.001
  variables:
    R_mode: homogeneous
    R_k_avg: 1.0
    R_self_loops: 0
dataset:
  dimensions: 2
  steps: 5
  mode: velocity
  strategy:
    name: PhysicsWalkStrategy
    params:
      max_acceleration: 0.105
      mass: 1.0
      friction_coeff: 0.1
      friction_order: 2
      max_speed: 10.0
  boundary:
    name: PolygonBoundary
    params:
      n_sides: 12
      radius: 1.0
      rotation: pi/4
  split:
    train: 0.7
    dev: 0.2
    test: 0.1
  samples: 5000
  seed: 0
