# Path integration dataset library — 1D
#
# Mother: NoBoundary — neutral base, no boundary interaction. Each universe
# overrides only the boundary (and optionally max_acceleration or mode).
#
# Profiles span qualitatively distinct regimes, not arbitrary spectrum points:
#
#   (mother)               — no boundary, velocity. Pure integration baseline.
#   soft_boundary          — soft boundary (spring). Velocity is actual motion; linear.
#   hard_boundary          — hard boundary, full acceleration. Clearly non-linear.
#   hard_boundary_low_acc  — hard boundary, low acceleration. Transition point.
#   displacement           — displacement mode. Always linear by telescoping identity.
#
# Summary table (linear baseline = PathIntegrationLinearityModel, no reservoir):
#
#   universe              mode         boundary             baseline  what it tests
#   ──────────────────────────────────────────────────────────────────────────────
#   (mother)              velocity     none                 100%      pure integration, no boundary
#   soft_boundary         velocity     soft Linear k=0.5    100%      integration + soft containment — current production
#   hard_boundary         velocity     hard IntervalBndry  ~13.8%     integration + boundary model required
#   hard_boundary_low_acc velocity     hard IntervalBndry  ~99.5%     boundary just barely reached
#   displacement          displacement none                 100%      trivially linear by telescoping identity
#
# Note: 1D hits the wall more readily than 2D at the same acceleration,
# hence higher non-linearity (~13.8% vs 8.8% in 2D).
#
# Verify or re-measure any score with linearity_probe.py:
#   python project/path_integration/test/linearity_probe.py \
#       project/path_integration/test/config/1D/grid_search/linearity/library.yaml [--universe <name>]
#
# Dataset properties are verified by:
#   pytest project/path_integration/test/test_dataset_properties.py -v

dataset:
  dimensions: 1
  steps: 5
  mode: velocity
  strategy:
    name: PhysicsWalkStrategy
    params:
      max_acceleration: 0.5
      mass: 1.0
      friction_coeff: 0.1
      friction_order: 2
      max_speed: 10.0
  boundary:
    name: NoBoundary
  samples: 5000
  seed: 0

multiverse_overrides:

  # ── soft_boundary ───────────────────────────────────────────────────
  # Soft boundary modifies velocity rather than clipping position, so the
  # trapezoidal rule holds and the task is linear. Current production config.
  # Linear baseline: 100%
  soft_boundary:
    dataset:
      boundary:
        name: LinearSoftBoundary
        params:
          spring_constant: 0.5

  # ── hard_boundary ───────────────────────────────────────────────────────────────
  # Hard boundary: position is clipped at the wall but velocity carries on.
  # The model must integrate + detect boundary hits — genuinely non-linear.
  # Linear baseline: ~13.8%
  hard_boundary:
    dataset:
      boundary:
        name: IntervalBoundary

  # ── hard_boundary_low_acc ──────────────────────────────────────────────────────────────
  # Hard boundary, reduced acceleration. Only a small fraction of paths hit the
  # wall; locates the linear↔non-linear transition precisely.
  # Linear baseline: ~99.5%  (max_acceleration=0.054)
  hard_boundary_low_acc:
    dataset:
      boundary:
        name: IntervalBoundary
      strategy:
        params:
          max_acceleration: 0.054

  # ── displacement ───────────────────────────────────────────────────────────────────
  # Displacement mode: x[i] = actual Δp[i]. Telescoping identity guarantees
  # y = Σ x[i] exactly — trivially linear regardless of boundary.
  # Linear baseline: 100%
  displacement:
    dataset:
      mode: displacement
