model:
  wiring:
  - type: pattern
    source: B
    target: I
    pattern: identity
  - type: gnm
    source: R
    target: R
    k_avg: R_k_avg
    k_min: 0
    k_max: 8
    self_loops: 0.1
    mode: R_mode
  input_layer:
    encoding: base2
    features: 1
    resolution: 8
    redundancy: 1
  reservoir_layer:
    n_nodes: [64, 128]
    p: 0.5
    init: random
    seed: 1
  output_layer:
    n_nodes: 1
  training:
    seed: 0
    batch_size: 64
    criterion: MSE
    evaluation: dev
    accuracy_threshold: 0.1
    optim:
      name: ridge
      params:
        alpha: 0.001
  variables:
    R_k_avg: [2, 4]
    R_mode: homogeneous
logging:
  out_path: /tmp/boolean_reservoir/test/smoke_grid
  save_keys: [parameters]
  grid_search:
    run: [train]
dataset:
  name: temporal
  task: density
  bits: 8
  window: 3
  delay: 1
  samples: 512
  seed: 0
  split:
    train: 0.8
    dev: 0.1
    test: 0.1
